services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: estudohub_admin
      POSTGRES_PASSWORD: dev_secret_vault_99
      POSTGRES_DB: estudohub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    depends_on:
      - db
      - cache
      - ollama

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${REMOTE_IP:-localhost}:8000

  cache:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  ollama_data:
