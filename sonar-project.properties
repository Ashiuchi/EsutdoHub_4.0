sonar.projectKey=EstudoHub_4.0
sonar.projectName=EstudoHub 4.0

# Sources: backend/app so coverage paths (e.g. api/endpoints.py) resolve correctly.
# coverage.xml has <source>/app/app</source> — paths are relative to that source dir,
# matching files under backend/app/ in the scanner container (/usr/src/backend/app/).
sonar.sources=backend/app,frontend/src
sonar.exclusions=**/node_modules/**,**/.next/**,**/storage/**,**/venv/**,**/__pycache__/**,**/debug/**,**/migrations/**,**/tests/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/test-reports/coverage.xml

# __init__.py entries in coverage.xml have no directory prefix (ambiguous) — exclude them.
sonar.coverage.exclusions=frontend/**,**/__init__.py
