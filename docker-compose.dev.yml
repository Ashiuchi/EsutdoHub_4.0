services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./storage_k:/storage_k
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://estudohub_admin:estudohub_pass@db:5432/estudohub
      - OLLAMA_HOST=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - db
      - ollama

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=estudohub_admin
      - POSTGRES_PASSWORD=estudohub_pass
      - POSTGRES_DB=estudohub
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  moenda:
    build: ./backend
    command: python mass_ingestion_industrial.py
    volumes:
      - ./backend:/app
      - ./storage_k:/storage_k
      - ./storage:/app/storage
    environment:
      - DATABASE_URL=postgresql://estudohub_admin:estudohub_pass@db:5432/estudohub
      - OLLAMA_HOST=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - db
      - ollama
    restart: unless-stopped

  pescador:
    build:
      context: ./backend/scripts
      dockerfile: Dockerfile.pescador
    volumes:
      - ./storage_k:/storage_k
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
